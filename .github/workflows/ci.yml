name: CI
on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
jobs:
  ci:
    name: Run checks and tests over ${{matrix.otp}} and ${{matrix.os}}
    runs-on: ${{matrix.os}}
    container:
      image: erlang:${{ matrix.otp }}

    strategy:
      fail-fast: false
      matrix:
        otp: ["29.0", "28.5", "27.3", "26.2", "25.3"]
        os: ["ubuntu-22.04"]

    steps:
      - uses: actions/checkout@v3

      - name: Compile
        run: make

      - name: xref
        run: make xref

      - name: Code formatter validation
        run: make format_check

      - name: Eunit test
        run: make eunit

      - name: Proper test
        run: make proper

      - name: Check coverage
        run: make cover

      - name: Generate docs
        run: make doc

      - name: Dialyze
        run: make dialyzer
